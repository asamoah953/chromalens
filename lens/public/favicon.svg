<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Left lens gradient: dark tinted (photochromic) -->
    <radialGradient id="lensL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.95"/>
    </radialGradient>
    <!-- Right lens gradient: slightly lighter (transitioning) -->
    <radialGradient id="lensR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.9"/>
    </radialGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="#0f172a"/>

  <!-- Sun rays (top-right corner, subtle) -->
  <g opacity="0.75">
    <circle cx="52" cy="12" r="5" fill="url(#sunGlow)"/>
    <!-- Rays -->
    <line x1="52" y1="4"  x2="52" y2="2"  stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="52" y1="20" x2="52" y2="22" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="44" y1="12" x2="42" y2="12" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="12" x2="62" y2="12" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="46.3" y1="6.3"  x2="44.9" y2="4.9"  stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="57.7" y1="17.7" x2="59.1" y2="19.1" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="57.7" y1="6.3"  x2="59.1" y2="4.9"  stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="46.3" y1="17.7" x2="44.9" y2="19.1" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Frame bridge (centre connector) -->
  <rect x="28" y="30" width="8" height="2.5" rx="1.25" fill="#94a3b8"/>

  <!-- Left lens frame -->
  <rect x="6" y="24" width="22" height="16" rx="7" fill="url(#lensL)" stroke="#818cf8" stroke-width="1.5"/>

  <!-- Right lens frame -->
  <rect x="36" y="24" width="22" height="16" rx="7" fill="url(#lensR)" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Left temple arm -->
  <path d="M6 32 Q3 32 2 34" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Right temple arm -->
  <path d="M58 32 Q61 32 62 34" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Shine glare on left lens -->
  <ellipse cx="13" cy="27" rx="3" ry="1.5" fill="white" opacity="0.18" transform="rotate(-20 13 27)"/>

  <!-- Shine glare on right lens -->
  <ellipse cx="43" cy="27" rx="3" ry="1.5" fill="white" opacity="0.15" transform="rotate(-20 43 27)"/>

  <!-- Nose pads -->
  <circle cx="28" cy="33" r="1" fill="#64748b"/>
  <circle cx="36" cy="33" r="1" fill="#64748b"/>
</svg>